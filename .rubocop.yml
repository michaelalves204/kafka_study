# .rubocop.yml

# Relaxa métricas de tamanho para permitir documentação YARD completa
# sem falsos positivos. A documentação não deveria contar como
# "linhas de código" para efeitos de lint.

Metrics/ClassLength:
  Max: 200
  Exclude:
    - '**/*_test.rb'
    - '**/*_spec.rb'

Metrics/MethodLength:
  Max: 20
  Exclude:
    - '**/*_test.rb'
    - '**/*_spec.rb'

Metrics/AbcSize:
  Max: 25

# Estilo: permitir modifier if em linha única (ex: `raise if cond`)
# sem exigir linha em branco após guard clause.
Layout/EmptyLineAfterGuardClause:
  Enabled: false

# Permite block comments como documentação
Style/BlockComments:
  Enabled: false

# Estilo pessoal: manter consistência com aspas simples
Style/StringLiterals:
  EnforcedStyle: single_quotes

# Ignora warnings de novos cops não configurados
AllCops:
  NewCops: enable
